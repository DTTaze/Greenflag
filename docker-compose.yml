networks:
  greenflag-net:
    external: true

volumes:
  postgres_data:
  redis_data:

services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123}
      POSTGRES_DB: ${DB_SCHEMA:-greenflag}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - greenflag-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Cache + BullMQ) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - greenflag-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ──────────────────────────────────────
  backend:
    platform: linux/amd64
    build:
      context: ./backend-nestjs
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "${PORT:-3030}:${PORT:-3030}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - greenflag-net

  # ── Next.js Frontend ────────────────────────────────────
  frontend:
    platform: linux/amd64
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    env_file:
      - ./.env
    ports:
      - "5173:5173"
    environment:
      - NESTJS_API_URL=http://backend:3030
    depends_on:
      - backend
    networks:
      - greenflag-net
